<!DOCTYPE html>
<html>
<head>
<title>Online Quiz</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h1>Online Quiz</h1>

<form action="/submit" method="POST">

{% for q in questions %}
{% set qindex = loop.index0 %}

<div class="slide">
<h3>Question {{loop.index}} / {{questions|length}}</h3>
<p>{{q.question}}</p>

{% for option in q.options %}
<label>
<input type="radio" name="q{{qindex}}" value="{{option}}" required>
{{option}}
</label>
<br>
{% endfor %}

</div>
{% endfor %}

<div class="buttons">
<button type="button" onclick="prev()">Previous</button>
<button type="button" onclick="next()">Next</button>
<button type="submit">Submit</button>
</div>

</form>

<script>
let slides = document.querySelectorAll(".slide")
let current = 0
let timer;

function showSlide(n){
    slides.forEach(slide => slide.style.display="none")
    slides[n].style.display="block"

    // Start 30-sec timer for each question
    clearTimeout(timer)
    timer = setTimeout(() => { 
        if(current < slides.length-1){ current++; showSlide(current) } 
    }, 30000)
}

showSlide(current)

function next(){
    if(current < slides.length-1){
        current++
        showSlide(current)
    }
}

function prev(){
    if(current > 0){
        current--
        showSlide(current)
    }
}
</script>

</body>
</html>
